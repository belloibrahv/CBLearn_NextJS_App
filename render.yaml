databases:
  - name: cblearn-db
    plan: free
    databaseName: cblearn
    user: cblearn

services:
  - type: web
    name: cblearn-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cblearn-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 22.22.2

services:
  postgres:
    image: postgres:16-alpine
    container_name: cblearn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cblearn
      POSTGRES_PASSWORD: cblearn_password
      POSTGRES_DB: cblearn
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.postgres.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cblearn -d cblearn"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cblearn-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://cblearn:cblearn_password@postgres:5432/cblearn
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_in_production}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env

volumes:
  postgres_data:
